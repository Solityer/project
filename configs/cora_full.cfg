dataset = cora
data_root = data
cache_root = data/cache
export_dir = runs/cora_full
checkpoint_bundle = artifacts/checkpoints/cora_gat
reference_output_dir = runs/cora_full/reference
task_type = transductive_node_classification
report_unit = node
batching_rule = whole_graph_single
self_loop_rule = per_node
edge_sort_rule = edge_gid_then_dst_stable
chunking_rule = none
L = 2
hidden_profile = [8x8]
d_in_profile = [1433]
K_out = 1
hidden_dim = 8
num_classes = 7
range_bits = 12
# seed now only controls deterministic setup material; formal model parameters
# must come from checkpoint_bundle and cannot fall back to synthetic generation.
seed = 11
dump_trace = false
auto_prepare_dataset = false
